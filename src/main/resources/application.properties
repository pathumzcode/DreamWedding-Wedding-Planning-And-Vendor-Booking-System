# ============================================================
# DreamWedding - Application Configuration
# ============================================================

spring.application.name=DreamWedding

# ============================================================
# MongoDB Configuration
# ============================================================
spring.mongodb.uri=mongodb+srv://root:1234@oop.oclqvu6.mongodb.net/oop_db?retryWrites=true&w=majority
spring.mongodb.database=wedding_system
spring.data.mongodb.auto-index-creation=true

# ============================================================
# Server Configuration
# ============================================================
server.port=8080

# ============================================================
# Static resources
# ============================================================
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**

# ============================================================
# Spring Security - Disable default login page for REST API
# ============================================================
spring.security.user.name=admin
spring.security.user.password=admin

# ============================================================
# Logging
# ============================================================
logging.level.org.springframework.security=DEBUG
logging.level.com.wedding.dreamwedding=DEBUG
