<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - DreamWedding</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #b8963e;
            --primary-hover: #a38535;
            --bg-light: #fdfbf7;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: transparent !important;
            color: #333;
        }

        body::before {
            content: "";
            position: fixed;
            top: -20px; left: -20px; right: -20px; bottom: -20px;
            z-index: -1;
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('https://images.unsplash.com/photo-1519741497674-611481863552?q=80&w=2070&auto=format&fit=crop') no-repeat center center;
            background-size: cover;
            filter: blur(8px);
        }

        .navbar-brand {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            color: var(--primary-color) !important;
            font-size: 1.5rem;
        }

        .auth-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2) !important;
            background: rgba(255, 255, 255, 0.95) !important;
            backdrop-filter: blur(10px);
        }

        .btn-custom {
            background-color: var(--primary-color);
            color: white;
            border: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-custom:hover {
            background-color: var(--primary-hover);
            color: white;
            transform: translateY(-2px);
        }

        .form-label {
            font-size: 0.9rem;
            color: #555;
            margin-bottom: 0.5rem;
        }

        .form-control, .form-select {
            border-radius: 10px;
            padding: 0.75rem 1rem;
            border: 1px solid #e1e1e1;
            background-color: #fcfcfc;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.25rem rgba(184,150,62,0.1);
            background-color: #fff;
        }

        #messageBox {
            display: none;
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }

        .spinner-border {
            width: 1.2rem;
            height: 1.2rem;
            margin-right: 0.5rem;
            display: none;
        }

        .password-match-hint {
            font-size: 0.8rem;
            margin-top: 0.35rem;
            min-height: 1.1em;
            transition: color 0.2s;
        }

        .input-group .form-control.is-invalid {
            border-color: #dc3545;
            box-shadow: none;
        }

        .input-group .form-control.is-valid {
            border-color: #198754;
            box-shadow: none;
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg py-3">
        <div class="container">
            <a class="navbar-brand" href="../index.html">DreamWedding</a>
        </div>
    </nav>

    <!-- Registration Section -->
    <div class="container my-auto py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card auth-card p-4 p-md-5">
                    <div class="text-center mb-4">
                        <h2 class="fw-bold mb-2" style="font-family: 'Playfair Display', serif;">Join DreamWedding</h2>
                        <p class="text-muted">Create your account to start planning your perfect day</p>
                    </div>

                    <!-- Notification Box -->
                    <div id="messageBox"></div>
                    
                    <form id="registerForm" novalidate>
                        <div class="row mb-3">
                            <div class="col-md-6 mb-3 mb-md-0">
                                <label for="firstName" class="form-label fw-semibold">First name</label>
                                <input type="text" class="form-control" id="firstName" placeholder="Pathum" required>
                            </div>
                            <div class="col-md-6">
                                <label for="lastName" class="form-label fw-semibold">Last name</label>
                                <input type="text" class="form-control" id="lastName" placeholder="Bandara" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label fw-semibold">Email address</label>
                            <input type="email" class="form-control" id="email" placeholder="pathum@example.com" required>
                        </div>

                        <div class="mb-3">
                            <label for="phoneNumber" class="form-label fw-semibold">Phone number</label>
                            <input type="tel" class="form-control" id="phoneNumber" placeholder="0771234567" required>
                        </div>

                        <div class="mb-3">
                            <label for="role" class="form-label fw-semibold">I am a...</label>
                            <select class="form-select" id="role" required>
                                <option value="" selected disabled>Select your role</option>
                                <option value="CUSTOMER">Customer (Planning a wedding)</option>
                                <option value="VENDOR">Vendor (Providing services)</option>
                                <option value="HOTEL">Hotel / Venue Owner</option>
                                <option value="ADMIN">Administrator</option>
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label for="password" class="form-label fw-semibold">Password</label>
                            <div class="input-group">
                                <input type="password" class="form-control border-end-0" id="password" placeholder="Min 6 characters" required minlength="6">
                                <span class="input-group-text bg-transparent border-start-0" style="cursor: pointer;" onclick="togglePassword('password','toggleIconPwd')">
                                    <i class="fa-solid fa-eye" id="toggleIconPwd"></i>
                                </span>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="confirmPassword" class="form-label fw-semibold">Confirm password</label>
                            <div class="input-group">
                                <input type="password" class="form-control border-end-0" id="confirmPassword" placeholder="Re-enter your password" required>
                                <span class="input-group-text bg-transparent border-start-0" style="cursor: pointer;" onclick="togglePassword('confirmPassword','toggleIconConfirm')">
                                    <i class="fa-solid fa-eye" id="toggleIconConfirm"></i>
                                </span>
                            </div>
                            <div class="password-match-hint" id="matchHint"></div>
                        </div>
                        
                        <button class="btn btn-custom w-100 py-3 mb-4 d-flex align-items-center justify-content-center" type="submit" id="submitBtn">
                            <div class="spinner-border text-light" role="status" id="submitSpinner"></div>
                            <span id="btnText">Create account</span>
                        </button>
                        
                        <div class="text-center">
                            <p class="text-muted mb-0">Already have an account? <a href="login.html" class="text-primary fw-bold text-decoration-none" style="color: var(--primary-color) !important;">Sign in</a></p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/script.js"></script>
    
    <script>
        const registerForm = document.getElementById('registerForm');
        const messageBox = document.getElementById('messageBox');
        const submitBtn = document.getElementById('submitBtn');
        const submitSpinner = document.getElementById('submitSpinner');
        const btnText = document.getElementById('btnText');

        // Toggle Password Visibility (works for both password fields)
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        // Real-time confirm password match indicator
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const passwordInput = document.getElementById('password');
        const matchHint = document.getElementById('matchHint');

        function checkPasswordMatch() {
            const pw = passwordInput.value;
            const cpw = confirmPasswordInput.value;
            if (!cpw) {
                matchHint.textContent = '';
                confirmPasswordInput.classList.remove('is-valid', 'is-invalid');
                return;
            }
            if (pw === cpw) {
                matchHint.textContent = '✓ Passwords match';
                matchHint.style.color = '#198754';
                confirmPasswordInput.classList.add('is-valid');
                confirmPasswordInput.classList.remove('is-invalid');
            } else {
                matchHint.textContent = '✗ Passwords do not match';
                matchHint.style.color = '#dc3545';
                confirmPasswordInput.classList.add('is-invalid');
                confirmPasswordInput.classList.remove('is-valid');
            }
        }

        confirmPasswordInput.addEventListener('input', checkPasswordMatch);
        passwordInput.addEventListener('input', checkPasswordMatch);

        // Show Notification
        function showMessage(msg, type) {
            messageBox.textContent = msg;
            messageBox.style.display = 'block';
            messageBox.className = type === 'success' ? 'alert alert-success' : 'alert alert-danger';
            
            // Scroll to message
            messageBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        // Form Submission
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Reset UI
            messageBox.style.display = 'none';
            
            // Basic Client-side validation
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const email = document.getElementById('email').value.trim();
            const phoneNumber = document.getElementById('phoneNumber').value.trim();
            const role = document.getElementById('role').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!firstName || !lastName || !email || !phoneNumber || !role || !password || !confirmPassword) {
                showMessage('All fields are required.', 'error');
                return;
            }

            if (password.length < 6) {
                showMessage('Password must be at least 6 characters.', 'error');
                return;
            }

            if (password !== confirmPassword) {
                showMessage('Passwords do not match. Please re-enter.', 'error');
                document.getElementById('confirmPassword').focus();
                return;
            }

            // Prepare Data
            const data = {
                firstName,
                lastName,
                email,
                phoneNumber,
                role,
                password
            };

            // Loading state
            submitBtn.disabled = true;
            submitSpinner.style.display = 'inline-block';
            btnText.textContent = 'Creating Account...';

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    // Log Activity
                    if (typeof logActivity === 'function') {
                        await logActivity('SIGN_IN', result.role, result);
                    }
                    showMessage(result.message || 'Registration successful! Redirecting...', 'success');
                    registerForm.reset();
                    // Redirect to login after 2 seconds
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    // Handle server-side validation or duplicate email errors
                    let errorMsg = result.message || 'Registration failed.';
                    if (result.fieldErrors) {
                        const firstErrorField = Object.keys(result.fieldErrors)[0];
                        errorMsg = result.fieldErrors[firstErrorField];
                    }
                    showMessage(errorMsg, 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage('Connection error. Please try again later.', 'error');
            } finally {
                // Reset loading state
                submitBtn.disabled = false;
                submitSpinner.style.display = 'none';
                btnText.textContent = 'Create Account';
            }
        });
    </script>
</body>
</html>
