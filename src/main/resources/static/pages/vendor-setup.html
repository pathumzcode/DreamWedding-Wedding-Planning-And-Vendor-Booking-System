<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Business Setup - DreamWedding</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #b8963e;
            --primary-hover: #a38535;
            --bg-light: #fdfbf7;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: transparent !important;
            color: #333;
        }

        body::before {
            content: "";
            position: fixed;
            top: -20px; left: -20px; right: -20px; bottom: -20px;
            z-index: -1;
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('https://images.unsplash.com/photo-1519741497674-611481863552?q=80&w=2070&auto=format&fit=crop') no-repeat center center;
            background-size: cover;
            filter: blur(8px);
        }

        .navbar-brand {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            color: var(--primary-color) !important;
            font-size: 1.5rem;
        }

        .auth-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2) !important;
            background: rgba(255, 255, 255, 0.95) !important;
            backdrop-filter: blur(10px);
        }

        .btn-custom {
            background-color: var(--primary-color);
            color: white;
            border: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-custom:hover {
            background-color: var(--primary-hover);
            color: white;
            transform: translateY(-2px);
        }

        .form-label {
            font-size: 0.9rem;
            color: #555;
            margin-bottom: 0.5rem;
        }

        .form-control, .form-select {
            border-radius: 10px;
            padding: 0.75rem 1rem;
            border: 1px solid #e1e1e1;
            background-color: #fcfcfc;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.25rem rgba(184,150,62,0.1);
            background-color: #fff;
        }

        #messageBox {
            display: none;
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }

        .spinner-border {
            width: 1.2rem;
            height: 1.2rem;
            margin-right: 0.5rem;
            display: none;
        }
        
        .section-title {
            font-family: 'Playfair Display', serif;
            color: var(--primary-color);
            border-bottom: 2px solid #f0e6d2;
            padding-bottom: 10px;
            margin-bottom: 20px;
            margin-top: 30px;
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg py-3">
        <div class="container">
            <a class="navbar-brand" href="../index.html">DreamWedding</a>
        </div>
    </nav>

    <!-- Setup Section -->
    <div class="container my-auto py-5">
        <div class="row justify-content-center">
            <div class="col-md-10 col-lg-8">
                <div class="card auth-card p-4 p-md-5">
                    <div class="text-center mb-4">
                        <h2 class="fw-bold mb-2" style="font-family: 'Playfair Display', serif;">Complete Your Business Profile</h2>
                        <p class="text-muted">Let couples know about your amazing services</p>
                    </div>

                    <div id="messageBox"></div>
                    
                    <form id="setupForm" novalidate>
                        
                        <h4 class="section-title">Basic Information</h4>
                        
                        <div class="row mb-3">
                            <div class="col-md-6 mb-3 mb-md-0">
                                <label for="businessName" class="form-label fw-semibold">Business Name *</label>
                                <input type="text" class="form-control" id="businessName" required>
                            </div>
                            <div class="col-md-6">
                                <label for="category" class="form-label fw-semibold">Category *</label>
                                <select class="form-select" id="category" required>
                                    <option value="" selected disabled>Select Category</option>
                                    <option value="Photography">Photography</option>
                                    <option value="Jewellery and Attire">Jewellery and Attire</option>
                                    <option value="Florist">Florist</option>
                                    <option value="Gifts">Gifts</option>
                                    <option value="Wedding music and dancing">Wedding music and dancing</option>
                                    <option value="Food and catering">Food and catering</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="aboutUs" class="form-label fw-semibold">About Us *</label>
                            <textarea class="form-control" id="aboutUs" rows="4" required placeholder="Describe your business and services..."></textarea>
                        </div>
                        
                        <div class="mb-3">
                            <label for="location" class="form-label fw-semibold">Location (District) *</label>
                            <select class="form-select" id="location" required>
                                <option value="" selected disabled>Select District</option>
                                <option value="Ampara">Ampara</option>
                                <option value="Anuradhapura">Anuradhapura</option>
                                <option value="Badulla">Badulla</option>
                                <option value="Batticaloa">Batticaloa</option>
                                <option value="Colombo">Colombo</option>
                                <option value="Galle">Galle</option>
                                <option value="Gampaha">Gampaha</option>
                                <option value="Hambantota">Hambantota</option>
                                <option value="Jaffna">Jaffna</option>
                                <option value="Kalutara">Kalutara</option>
                                <option value="Kandy">Kandy</option>
                                <option value="Kegalle">Kegalle</option>
                                <option value="Kilinochchi">Kilinochchi</option>
                                <option value="Kurunegala">Kurunegala</option>
                                <option value="Mannar">Mannar</option>
                                <option value="Matale">Matale</option>
                                <option value="Matara">Matara</option>
                                <option value="Moneragala">Moneragala</option>
                                <option value="Mullaitivu">Mullaitivu</option>
                                <option value="Nuwara Eliya">Nuwara Eliya</option>
                                <option value="Polonnaruwa">Polonnaruwa</option>
                                <option value="Puttalam">Puttalam</option>
                                <option value="Ratnapura">Ratnapura</option>
                                <option value="Trincomalee">Trincomalee</option>
                                <option value="Vavuniya">Vavuniya</option>
                            </select>
                        </div>

                        <h4 class="section-title">Contact & Social Links</h4>

                        <div class="row mb-3">
                            <div class="col-md-6 mb-3 mb-md-0">
                                <label for="businessEmail" class="form-label fw-semibold">Business Email *</label>
                                <input type="email" class="form-control" id="businessEmail" required>
                            </div>
                            <div class="col-md-6">
                                <label for="businessPhone" class="form-label fw-semibold">Business Phone Number *</label>
                                <input type="tel" class="form-control" id="businessPhone" required>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6 mb-3 mb-md-0">
                                <label for="businessWhatsapp" class="form-label fw-semibold">Business WhatsApp Number *</label>
                                <input type="tel" class="form-control" id="businessWhatsapp" required>
                            </div>
                            <div class="col-md-6">
                                <label for="websiteLink" class="form-label fw-semibold">Website Link</label>
                                <input type="url" class="form-control" id="websiteLink" placeholder="https://">
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6 mb-3 mb-md-0">
                                <label for="instagramLink" class="form-label fw-semibold">Instagram Link</label>
                                <input type="url" class="form-control" id="instagramLink" placeholder="https://instagram.com/...">
                            </div>
                            <div class="col-md-6">
                                <label for="facebookLink" class="form-label fw-semibold">Facebook Link</label>
                                <input type="url" class="form-control" id="facebookLink" placeholder="https://facebook.com/...">
                            </div>
                        </div>

                        <h4 class="section-title">Packages (Up to 3 price ranges)</h4>
                        
                        <div id="packagesContainer">
                            <!-- Package 1 -->
                            <div class="card mb-3 p-3 bg-light border-0">
                                <h6 class="fw-bold">Package 1</h6>
                                <div class="row">
                                    <div class="col-md-6 mb-2">
                                        <input type="text" class="form-control pkg-name" placeholder="Package Name (e.g. Basic)">
                                    </div>
                                    <div class="col-md-6 mb-2">
                                        <input type="text" class="form-control pkg-price" placeholder="Price Range (e.g. Rs. 50,000 - 150,000)">
                                    </div>
                                    <div class="col-12">
                                        <textarea class="form-control pkg-desc" rows="2" placeholder="Package Description"></textarea>
                                    </div>
                                </div>
                            </div>
                            
                            <!-- Package 2 -->
                            <div class="card mb-3 p-3 bg-light border-0">
                                <h6 class="fw-bold">Package 2</h6>
                                <div class="row">
                                    <div class="col-md-6 mb-2">
                                        <input type="text" class="form-control pkg-name" placeholder="Package Name (e.g. Standard)">
                                    </div>
                                    <div class="col-md-6 mb-2">
                                        <input type="text" class="form-control pkg-price" placeholder="Price Range (e.g. Rs. 150,000 - 500,000)">
                                    </div>
                                    <div class="col-12">
                                        <textarea class="form-control pkg-desc" rows="2" placeholder="Package Description"></textarea>
                                    </div>
                                </div>
                            </div>
                            
                            <!-- Package 3 -->
                            <div class="card mb-3 p-3 bg-light border-0">
                                <h6 class="fw-bold">Package 3</h6>
                                <div class="row">
                                    <div class="col-md-6 mb-2">
                                        <input type="text" class="form-control pkg-name" placeholder="Package Name (e.g. Premium)">
                                    </div>
                                    <div class="col-md-6 mb-2">
                                        <input type="text" class="form-control pkg-price" placeholder="Price Range (e.g. Rs. 500,000+)">
                                    </div>
                                    <div class="col-12">
                                        <textarea class="form-control pkg-desc" rows="2" placeholder="Package Description"></textarea>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <h4 class="section-title">Gallery (3 Photos)</h4>
                        <div class="mb-4 text-muted small">Please select 3 images for your portfolio</div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Photo 1</label>
                            <input type="file" class="form-control gallery-file" accept="image/*">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Photo 2</label>
                            <input type="file" class="form-control gallery-file" accept="image/*">
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Photo 3</label>
                            <input type="file" class="form-control gallery-file" accept="image/*">
                        </div>
                        
                        <button class="btn btn-custom w-100 py-3 mb-4 d-flex align-items-center justify-content-center" type="submit" id="submitBtn">
                            <div class="spinner-border text-light" role="status" id="submitSpinner"></div>
                            <span id="btnText">Save & Continue to Dashboard</span>
                        </button>
                        
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        const setupForm = document.getElementById('setupForm');
        const messageBox = document.getElementById('messageBox');
        const submitBtn = document.getElementById('submitBtn');
        const submitSpinner = document.getElementById('submitSpinner');
        const btnText = document.getElementById('btnText');

        // Check if user is logged in
        const userStr = sessionStorage.getItem('dreamWeddingUser');
        if (!userStr) {
            window.location.href = 'login.html';
        }
        const user = JSON.parse(userStr);
        if (user.role !== 'VENDOR') {
            window.location.href = 'login.html';
        }

        // Fetch and load existing vendor profile details
        async function loadVendorProfile() {
            try {
                const response = await fetch(`/api/vendors/${user.id}`);
                if (response.ok) {
                    const data = await response.json();
                    if (data) {
                        if (data.businessName) {
                            document.getElementById('businessName').value = data.businessName;
                            // If businessName is already set, they can't change it!
                            document.getElementById('businessName').readOnly = true;
                            document.getElementById('businessName').classList.add('bg-light');
                            
                            // Add a visual hint
                            const helper = document.createElement('div');
                            helper.className = 'form-text text-muted small mt-1';
                            helper.innerHTML = '<i class="fa-solid fa-lock me-1"></i>Business name cannot be changed once established.';
                            document.getElementById('businessName').parentNode.appendChild(helper);
                        }
                        if (data.category) {
                            document.getElementById('category').value = data.category;
                            // If category is already set, they can't change it!
                            document.getElementById('category').disabled = true;
                            document.getElementById('category').classList.add('bg-light');
                            
                            // Add a visual hint
                            const helper = document.createElement('div');
                            helper.className = 'form-text text-muted small mt-1';
                            helper.innerHTML = '<i class="fa-solid fa-lock me-1"></i>Business category cannot be changed once established.';
                            document.getElementById('category').parentNode.appendChild(helper);
                        }
                        if (data.aboutUs) {
                            document.getElementById('aboutUs').value = data.aboutUs;
                        }
                        if (data.location) {
                            document.getElementById('location').value = data.location;
                        }
                        if (data.businessContact) {
                            document.getElementById('businessEmail').value = data.businessContact.email || data.email || '';
                            document.getElementById('businessPhone').value = data.businessContact.phone || data.phoneNumber || '';
                            document.getElementById('businessWhatsapp').value = data.businessContact.whatsapp || data.phoneNumber || '';
                            document.getElementById('websiteLink').value = data.businessContact.website || '';
                        } else {
                            document.getElementById('businessEmail').value = data.email || '';
                            document.getElementById('businessPhone').value = data.phoneNumber || '';
                            document.getElementById('businessWhatsapp').value = data.phoneNumber || '';
                        }
                        if (data.instagramLink) {
                            document.getElementById('instagramLink').value = data.instagramLink;
                        }
                        if (data.facebookLink) {
                            document.getElementById('facebookLink').value = data.facebookLink;
                        }
                        
                        // Populate packages
                        if (data.packages && data.packages.length > 0) {
                            const pkgNames = document.querySelectorAll('.pkg-name');
                            const pkgPrices = document.querySelectorAll('.pkg-price');
                            const pkgDescs = document.querySelectorAll('.pkg-desc');
                            data.packages.forEach((pkg, index) => {
                                if (index < pkgNames.length) {
                                    pkgNames[index].value = pkg.name || '';
                                    pkgPrices[index].value = pkg.priceRange || '';
                                    pkgDescs[index].value = pkg.description || '';
                                }
                            });
                        }

                        // Populate gallery photo previews
                        if (data.galleryPhotos && data.galleryPhotos.length > 0) {
                            const files = document.querySelectorAll('.gallery-file');
                            data.galleryPhotos.forEach((photo, index) => {
                                if (index < files.length && photo) {
                                    const previewContainer = document.createElement('div');
                                    previewContainer.className = 'mt-2';
                                    previewContainer.innerHTML = `
                                        <div class="small text-muted mb-1">Current Photo:</div>
                                        <img src="${photo}" class="rounded shadow-sm" style="max-height: 80px; object-fit: cover; border: 1px solid #ddd;" />
                                    `;
                                    files[index].parentNode.appendChild(previewContainer);
                                }
                            });
                        }
                    }
                }
            } catch (err) {
                console.error('Error fetching vendor data:', err);
            }
        }
        loadVendorProfile();

        // Helper to convert file to Base64
        const fileToBase64 = (file) => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });

        // Show Notification
        function showMessage(msg, type) {
            messageBox.textContent = msg;
            messageBox.style.display = 'block';
            messageBox.className = type === 'success' ? 'alert alert-success' : 'alert alert-danger';
            messageBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        setupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            messageBox.style.display = 'none';
            
            const businessName = document.getElementById('businessName').value.trim();
            const category = document.getElementById('category').value;
            const aboutUs = document.getElementById('aboutUs').value.trim();
            const location = document.getElementById('location').value.trim();
            const businessEmail = document.getElementById('businessEmail').value.trim();
            const businessPhone = document.getElementById('businessPhone').value.trim();
            const businessWhatsapp = document.getElementById('businessWhatsapp').value.trim();

            if (!businessName || !category || !aboutUs || !location || !businessEmail || !businessPhone || !businessWhatsapp) {
                showMessage('Please fill in all required fields marked with *.', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitSpinner.style.display = 'inline-block';
            btnText.textContent = 'Saving Profile...';

            try {
                // Collect packages
                const packages = [];
                const pkgNames = document.querySelectorAll('.pkg-name');
                const pkgPrices = document.querySelectorAll('.pkg-price');
                const pkgDescs = document.querySelectorAll('.pkg-desc');
                
                for(let i = 0; i < pkgNames.length; i++) {
                    if(pkgNames[i].value.trim() !== '') {
                        packages.push({
                            name: pkgNames[i].value.trim(),
                            priceRange: pkgPrices[i].value.trim(),
                            description: pkgDescs[i].value.trim()
                        });
                    }
                }

                // Collect images
                const galleryPhotos = [];
                const files = document.querySelectorAll('.gallery-file');
                for (let i = 0; i < files.length; i++) {
                    if (files[i].files.length > 0) {
                        const base64 = await fileToBase64(files[i].files[0]);
                        galleryPhotos.push(base64);
                    }
                }

                const payload = {
                    businessName,
                    category,
                    aboutUs,
                    location,
                    businessEmail,
                    businessPhone,
                    businessWhatsapp,
                    websiteLink: document.getElementById('websiteLink').value.trim(),
                    instagramLink: document.getElementById('instagramLink').value.trim(),
                    facebookLink: document.getElementById('facebookLink').value.trim(),
                    packages,
                    galleryPhotos
                };

                const response = await fetch(`/api/vendors/${user.id}/profile`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    showMessage('Profile updated successfully!', 'success');
                    
                    // Update session state
                    user.profileCompleted = true;
                    sessionStorage.setItem('dreamWeddingUser', JSON.stringify(user));
                    
                    setTimeout(() => {
                        window.location.href = 'vendor-dashboard.html';
                    }, 1500);
                } else {
                    showMessage('Failed to update profile. Please try again.', 'error');
                }
            } catch (error) {
                console.error(error);
                showMessage('Connection error. Please try again later.', 'error');
            } finally {
                submitBtn.disabled = false;
                submitSpinner.style.display = 'none';
                btnText.textContent = 'Save & Continue to Dashboard';
            }
        });
    </script>
</body>
</html>
