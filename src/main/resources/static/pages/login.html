<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - DreamWedding</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/styles.css">
  <style>
    #loginMessageBox { display: none; border-radius: 10px; padding: 1rem; margin-bottom: 1rem; }
    .spinner-border-sm { width: 1.1rem; height: 1.1rem; margin-right: 0.5rem; display: none; }
    body {
      background-color: transparent !important;
    }
    body::before {
      content: "";
      position: fixed;
      top: -20px; left: -20px; right: -20px; bottom: -20px;
      z-index: -1;
      background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('https://images.unsplash.com/photo-1519741497674-611481863552?q=80&w=2070&auto=format&fit=crop') no-repeat center center;
      background-size: cover;
      filter: blur(8px);
    }
    .auth-card {
      background: rgba(255, 255, 255, 0.95) !important;
      backdrop-filter: blur(10px);
      box-shadow: 0 15px 35px rgba(0,0,0,0.2) !important;
    }
    .navbar-brand {
      color: #b8963e !important;
    }
  </style>
</head>
<body class="d-flex flex-column min-vh-100">

  <!-- Navigation -->
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="../index.html">DreamWedding</a>
    </div>
  </nav>

  <!-- Login Form -->
  <div class="container my-auto py-5">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="card auth-card p-4 p-md-5">
          <div class="text-center mb-4">
            <h2 class="fw-bold">Welcome back</h2>
            <p class="text-muted">Login to manage your wedding plans</p>
          </div>

          <div id="loginMessageBox"></div>

          <form id="loginForm" novalidate>
            <div class="mb-3">
              <label for="email" class="form-label fw-bold">Email address</label>
              <div class="input-group">
                <span class="input-group-text bg-white"><i class="fa-regular fa-envelope"></i></span>
                <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
                <div class="invalid-feedback">Please enter a valid email.</div>
              </div>
            </div>

            <div class="mb-4">
              <label for="password" class="form-label fw-bold d-flex justify-content-between">
                Password
                <a href="#" class="text-primary text-decoration-none small">Forgot password?</a>
              </label>
              <div class="input-group">
                <span class="input-group-text bg-white"><i class="fa-solid fa-lock"></i></span>
                <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
                <div class="invalid-feedback">Please enter your password.</div>
              </div>
            </div>

            <div class="mb-4 form-check">
              <input type="checkbox" class="form-check-input" id="rememberMe">
              <label class="form-check-label text-muted" for="rememberMe">Remember me</label>
            </div>

            <button class="btn btn-custom w-100 py-2 mb-3 d-flex align-items-center justify-content-center" type="submit" id="loginSubmitBtn">
              <span class="spinner-border spinner-border-sm text-light" role="status" id="loginSpinner"></span>
              <span id="loginBtnText">Login</span>
            </button>

            <div class="text-center mb-0">
              <p class="text-muted">Don't have an account? <a href="register.html" class="text-primary fw-bold text-decoration-none">Sign up</a></p>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/script.js"></script>
  <script>
    const loginForm = document.getElementById('loginForm');
    const messageBox = document.getElementById('loginMessageBox');
    const submitBtn = document.getElementById('loginSubmitBtn');
    const spinner = document.getElementById('loginSpinner');
    const btnText = document.getElementById('loginBtnText');

    function showMessage(msg, type) {
      messageBox.textContent = msg;
      messageBox.style.display = 'block';
      messageBox.className = type === 'success' ? 'alert alert-success' : 'alert alert-danger';
    }

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      messageBox.style.display = 'none';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showMessage('Email and password are required.', 'error');
        return;
      }

      submitBtn.disabled = true;
      spinner.style.display = 'inline-block';
      btnText.textContent = 'Logging in...';

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const result = await response.json();

        if (response.ok) {
          // Persist the user session for downstream pages
          sessionStorage.setItem('dreamWeddingUser', JSON.stringify(result));
          
          // Log Activity
          if (typeof logActivity === 'function') {
            await logActivity('LOGIN', result.role, result);
          }

          showMessage(result.message || 'Login successful! Redirecting...', 'success');

          // Redirect by role
          setTimeout(() => {
            if (result.role === 'ADMIN') {
              window.location.href = 'admin-dashboard.html';
            } else if (result.role === 'VENDOR') {
              window.location.href = !result.profileCompleted ? 'vendor-setup.html' : 'vendor-dashboard.html';
            } else if (result.role === 'HOTEL') {
              window.location.href = !result.profileCompleted ? 'hotel-setup.html' : 'hotel-dashboard.html';
            } else {
              window.location.href = 'customer-dashboard.html';
            }
          }, 800);
        } else {
          let errorMsg = result.message || 'Login failed.';
          if (result.fieldErrors) {
            const firstField = Object.keys(result.fieldErrors)[0];
            errorMsg = result.fieldErrors[firstField];
          }
          showMessage(errorMsg, 'error');
        }
      } catch (err) {
        console.error(err);
        showMessage('Connection error. Please try again later.', 'error');
      } finally {
        submitBtn.disabled = false;
        spinner.style.display = 'none';
        btnText.textContent = 'Login';
      }
    });
  </script>
</body>
</html>
