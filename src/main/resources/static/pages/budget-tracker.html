<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Budget Planner - DreamWedding</title>
  <meta name="description" content="Track your wedding expenses, view category breakdowns, and manage vendor estimates on DreamWedding.">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root { --gold:#b8963e; --gold-light:#fdf4e7; --gold-dark:#9a7a2e; --text:#1a1a1a; --muted:#777; }
    body { font-family:'Outfit',sans-serif; background:#f7f5f1; color:var(--text); margin:0; }

    .top-nav { background:white; border-bottom:1px solid #f0f0f0; padding:16px 28px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
    .top-nav .brand { font-family:'Playfair Display',serif; font-size:22px; color:var(--text); text-decoration:none; }
    .nav-actions { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .btn-nav { border:1.5px solid #ddd; background:none; color:var(--text); padding:8px 18px; border-radius:30px; font-size:13px; font-weight:600; cursor:pointer; text-decoration:none; transition:all .2s; white-space:nowrap; }
    .btn-nav:hover, .btn-nav.active { border-color:var(--gold); color:var(--gold); }
    .btn-nav.gold { background:var(--gold); color:white; border-color:var(--gold); }
    .btn-nav.gold:hover { background:var(--gold-dark); }

    .page-wrap { max-width:1200px; margin:36px auto; padding:0 20px 80px; }

    /* TOP STAT CARDS */
    .stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:20px; margin-bottom:32px; }
    .stat-card { background:white; border-radius:18px; padding:22px 24px; box-shadow:0 2px 10px rgba(0,0,0,.05); border:1px solid #f0f0f0; }
    .stat-card .s-label { font-size:11px; color:var(--muted); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:8px; }
    .stat-card .s-value { font-family:'Playfair Display',serif; font-size:26px; font-weight:700; }
    .stat-card .s-value.green { color:#27ae60; }
    .stat-card .s-value.red { color:#e53935; }
    .stat-card .s-value.gold { color:var(--gold); }
    .stat-card .s-sub { font-size:12px; color:var(--muted); margin-top:4px; }
    .stat-card.dark { background:linear-gradient(135deg,#1a1a1a,#2d2d2d); color:white; }
    .stat-card.dark .s-label { color:#aaa; }
    .stat-card.dark .s-value { color:white; }

    /* OVER-BUDGET ALERT */
    .over-budget-alert { background:#fff0f0; border:1px solid #f5c6c6; border-radius:14px; padding:14px 20px; margin-bottom:24px; display:none; font-size:14px; color:#c62828; }

    /* DONUT CHART */
    .donut-wrap { position:relative; width:200px; height:200px; margin:0 auto; }
    .donut-center { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; }
    .donut-center .dc-val { font-family:'Playfair Display',serif; font-size:20px; font-weight:700; }
    .donut-center .dc-sub { font-size:11px; color:var(--muted); }

    /* CARD PANEL */
    .card-panel { background:white; border-radius:20px; padding:28px; box-shadow:0 2px 12px rgba(0,0,0,.05); border:1px solid #f0f0f0; margin-bottom:28px; }
    .card-panel h5 { font-family:'Playfair Display',serif; font-size:19px; margin-bottom:20px; display:flex; align-items:center; gap:10px; }

    /* CATEGORY CARDS */
    .cat-card { border:1px solid #f0f0f0; border-radius:16px; padding:20px; margin-bottom:16px; transition:box-shadow .2s; }
    .cat-card:hover { box-shadow:0 4px 16px rgba(0,0,0,.07); }
    .cat-card.over { border-color:#f5c6c6; background:#fff8f8; }
    .cat-header { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; margin-bottom:14px; }
    .cat-name { font-size:16px; font-weight:600; display:flex; align-items:center; gap:8px; }
    .cat-icon { width:34px; height:34px; border-radius:10px; background:var(--gold-light); color:var(--gold); display:flex; align-items:center; justify-content:center; font-size:13px; }
    .cat-amounts { display:flex; gap:20px; flex-wrap:wrap; }
    .cat-amt-block { text-align:right; }
    .cat-amt-block span { display:block; font-size:11px; color:var(--muted); letter-spacing:.5px; }
    .cat-amt-block strong { font-size:15px; }
    .cat-amt-block strong.red { color:#e53935; }
    .progress-bar-bg { height:8px; background:#f0ece4; border-radius:20px; overflow:hidden; }
    .progress-bar-fill { height:100%; background:linear-gradient(90deg,var(--gold),#d4af37); border-radius:20px; transition:width 1s ease; }
    .progress-bar-fill.over { background:linear-gradient(90deg,#e53935,#ff6b6b); }
    .cat-footer { display:flex; justify-content:space-between; align-items:center; margin-top:8px; font-size:12px; color:var(--muted); }
    .over-tag { background:#ffebee; color:#c62828; border-radius:20px; padding:3px 10px; font-size:11px; font-weight:600; }

    /* EXPENSES TABLE */
    .exp-table { width:100%; border-collapse:collapse; font-size:14px; }
    .exp-table th { background:#fafafa; padding:10px 14px; text-align:left; font-size:11px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; border-bottom:1px solid #f0f0f0; }
    .exp-table td { padding:12px 14px; border-bottom:1px solid #f8f8f8; }
    .exp-table tr:last-child td { border-bottom:none; }
    .exp-table tr:hover td { background:#fafafa; }
    .badge-cat { background:var(--gold-light); color:var(--gold-dark); font-size:11px; font-weight:700; padding:4px 10px; border-radius:20px; white-space:nowrap; }
    .btn-del { background:none; border:none; color:#ccc; cursor:pointer; padding:4px 8px; border-radius:8px; transition:all .2s; }
    .btn-del:hover { color:#e53935; background:#fff0f0; }
    .btn-edit { background:none; border:none; color:#ccc; cursor:pointer; padding:4px 8px; border-radius:8px; transition:all .2s; }
    .btn-edit:hover { color:var(--gold); background:var(--gold-light); }



    /* MODAL */
    .modal-content { border-radius:20px; border:none; }
    .modal-header { border-bottom:none; padding:24px 28px 0; }
    .modal-body { padding:20px 28px; }
    .modal-footer { border-top:none; padding:0 28px 24px; }
    .form-label { font-size:13px; font-weight:600; color:var(--muted); }
    .form-control, .form-select { border-radius:12px; border:1px solid #e8e8e8; font-size:14px; padding:10px 14px; }
    .form-control:focus, .form-select:focus { border-color:var(--gold); box-shadow:none; }
    .btn-gold { background:var(--gold); color:white; border:none; border-radius:30px; padding:10px 28px; font-weight:700; }
    .btn-gold:hover { background:var(--gold-dark); color:white; }

    /* SUMMARY MODAL */
    .summary-item { display:flex; align-items:center; gap:14px; padding:14px 0; border-bottom:1px solid #f5f5f5; }
    .summary-item:last-child { border-bottom:none; }
    .summary-item .si-icon { width:40px; height:40px; border-radius:12px; background:var(--gold-light); color:var(--gold); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .summary-item .si-info { flex:1; }
    .summary-item .si-name { font-weight:600; font-size:14px; }
    .summary-item .si-meta { font-size:12px; color:var(--muted); }
    .summary-item .si-price { font-weight:700; font-size:15px; color:var(--gold); }

    /* TOAST */
    .toast-wrap { position:fixed; bottom:30px; right:30px; z-index:9999; }
    .toast-msg { background:#1a1a1a; color:white; padding:14px 22px; border-radius:14px; font-size:14px; font-weight:500; opacity:0; transform:translateY(20px); transition:all .35s; pointer-events:none; }
    .toast-msg.show { opacity:1; transform:translateY(0); }
    .toast-msg.success { border-left:4px solid #69e09a; }
    .toast-msg.error { border-left:4px solid #ff6b6b; }

    .loading-overlay { position:fixed; inset:0; background:rgba(255,255,255,.75); display:none; align-items:center; justify-content:center; z-index:1000; }
    .spinner { width:44px; height:44px; border:4px solid #f0ece4; border-top-color:var(--gold); border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    @media(max-width:640px) { .stats-grid { grid-template-columns:1fr 1fr; } .cat-amounts { gap:10px; } }
  </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay" style="display:none"><div class="spinner"></div></div>

<!-- Nav -->
<nav class="top-nav">
  <a class="brand" href="../index.html">DreamWedding</a>
  <div class="nav-actions">
    <a href="budget-calculator.html" class="btn-nav"><i class="fa-solid fa-sliders me-1"></i>Edit Setup</a>
    <button class="btn-nav gold" onclick="showSummaryModal()"><i class="fa-solid fa-receipt me-1"></i>Full Summary</button>
    <a href="customer-dashboard.html" class="btn-nav"><i class="fa-solid fa-arrow-left me-1"></i>Dashboard</a>
  </div>
</nav>

<div class="page-wrap">

  <!-- Over-budget alert -->
  <div class="over-budget-alert" id="overBudgetAlert">
    <i class="fa-solid fa-triangle-exclamation me-2"></i>
    <strong>Over budget!</strong> <span id="overBudgetMsg"></span>
  </div>

  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-card dark">
      <div class="s-label">Total Budget</div>
      <div class="s-value" id="sTotalBudget">Rs. 0</div>
      <div class="s-sub" style="color:#aaa">Master limit</div>
    </div>
    <div class="stat-card">
      <div class="s-label">Total Spent</div>
      <div class="s-value gold" id="sTotalSpent">Rs. 0</div>
      <div class="s-sub" id="sSpentPct">0% of budget</div>
    </div>
    <div class="stat-card">
      <div class="s-label">Remaining</div>
      <div class="s-value green" id="sRemaining">Rs. 0</div>
      <div class="s-sub">Available balance</div>
    </div>

  </div>

  <!-- Two-column layout -->
  <div class="row g-4">
    <!-- LEFT: Donut + Expenses -->
    <div class="col-lg-8">

      <!-- Donut chart -->
      <div class="card-panel">
        <h5><i class="fa-solid fa-chart-donut" style="color:var(--gold)"></i>Budget Overview</h5>
        <div class="row align-items-center">
          <div class="col-md-4 text-center mb-3 mb-md-0">
            <div class="donut-wrap">
              <canvas id="donutChart"></canvas>
              <div class="donut-center">
                <div class="dc-val" id="dcVal">0%</div>
                <div class="dc-sub">used</div>
              </div>
            </div>
          </div>
          <div class="col-md-8" id="donutLegend"></div>
        </div>
      </div>

      <!-- Expense table -->
      <div class="card-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:10px;">
          <h5 style="margin:0"><i class="fa-solid fa-receipt" style="color:var(--gold)"></i>Expense Log</h5>
          <button class="btn-nav gold" data-bs-toggle="modal" data-bs-target="#expenseModal" onclick="openAddExpense()">
            <i class="fa-solid fa-plus me-1"></i>Add Expense
          </button>
        </div>
        <div id="expenseTableWrap">
          <table class="exp-table">
            <thead><tr><th>Category</th><th>Description</th><th>Amount</th><th></th></tr></thead>
            <tbody id="expenseTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- RIGHT: Categories + Estimates -->
    <div class="col-lg-4">

      <!-- Category breakdown -->
      <div class="card-panel">
        <h5><i class="fa-solid fa-chart-pie" style="color:var(--gold)"></i>Categories</h5>
        <div id="categoryCards"></div>
        <div class="text-center mt-3">
          <a href="budget-calculator.html" class="btn-nav" style="font-size:12px; padding:6px 16px;">
            <i class="fa-solid fa-pen me-1"></i>Edit allocations
          </a>
        </div>
      </div>


    </div>
  </div>
</div>

<!-- ── EXPENSE MODAL ─────────────────────────────────────── -->
<div class="modal fade" id="expenseModal" tabindex="-1">
  <div class="modal-dialog"><div class="modal-content">
    <div class="modal-header">
      <h5 class="modal-title fw-bold" id="expenseModalTitle" style="font-family:'Playfair Display',serif">Add Expense</h5>
      <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
    </div>
    <form id="expenseForm">
      <input type="hidden" id="editExpenseId">
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label">Category</label>
          <select id="expCat" class="form-select" required></select>
        </div>
        <div class="mb-3">
          <label class="form-label">Description</label>
          <input type="text" id="expDesc" class="form-control" placeholder="e.g. Venue deposit" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Amount (Rs.)</label>
          <input type="number" id="expAmt" class="form-control" min="1" step="1" required>
        </div>
        <input type="hidden" id="expDate">
      </div>
      <div class="modal-footer gap-2">
        <button type="button" class="btn btn-light rounded-pill" data-bs-dismiss="modal">Cancel</button>
        <button type="submit" class="btn-gold">Save Expense</button>
      </div>
    </form>
  </div></div>
</div>

<!-- ── FULL SUMMARY MODAL ─────────────────────────────────── -->
<div class="modal fade" id="summaryModal" tabindex="-1">
  <div class="modal-dialog modal-lg"><div class="modal-content">
    <div class="modal-header">
      <h5 class="modal-title fw-bold" style="font-family:'Playfair Display',serif">
        <i class="fa-solid fa-receipt me-2" style="color:var(--gold)"></i>Full Wedding Budget Summary
      </h5>
      <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
    </div>
    <div class="modal-body" id="summaryBody"></div>
    <div class="modal-footer">
      <button class="btn btn-light rounded-pill" data-bs-dismiss="modal">Close</button>
    </div>
  </div></div>
</div>

<div class="toast-wrap"><div class="toast-msg" id="toastMsg"></div></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="../js/budget-tracker.js"></script>
</body>
</html>
