<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vendor Directory - DreamWedding</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/styles.css">
  <script src="../js/navbar-loader.js" defer></script>
</head>
<body class="bg-light">

  <!-- Navigation (loaded dynamically) -->
  <div id="navbar-placeholder"></div>

  <!-- Page Header -->
  <div class="bg-dark text-white py-5 text-center cinematic-overlay" style="background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1469334031218-e382a71b716b?auto=format&fit=crop&w=1500&q=80') center/cover;">
    <div class="container py-4">
      <h1 class="display-4 fw-bold">Find your perfect vendor</h1>
      <p class="lead">Browse venues, photographers, and more.</p>
    </div>
  </div>

  <div class="container my-5">
    <div class="row">
      <!-- Filter Sidebar -->
      <div class="col-md-3 mb-4">
        <button class="btn btn-outline-primary d-md-none w-100 mb-3" type="button" data-bs-toggle="collapse" data-bs-target="#filterCollapse">
          <i class="fa-solid fa-sliders me-2"></i> Show filters
        </button>
        <div class="collapse d-md-block" id="filterCollapse">
          <div class="card border-0 p-3 premium-card">
            <h5 class="fw-bold mb-3">Filters</h5>
            <form id="vendorFilterForm">
              <div class="mb-3">
                <label class="form-label fw-bold small text-muted">Category</label>
                <select class="form-select form-select-sm" id="categoryFilter" name="category">
                  <option value="">All categories</option>
                </select>
              </div>
              <div class="mb-3">
                <label class="form-label fw-bold small text-muted">District</label>
                <select class="form-select form-select-sm" id="locationFilter" name="location">
                  <option value="">All districts</option>
                </select>
              </div>
              <div class="mb-3">
                <label class="form-label fw-bold small text-muted">Price range</label>
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" value="0-100000" id="price1">
                  <label class="form-check-label small" for="price1">Under Rs. 100,000 (Budget)</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" value="100000-500000" id="price2">
                  <label class="form-check-label small" for="price2">Rs. 100,000 - 500,000 (Standard)</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" value="500000-10000000" id="price3">
                  <label class="form-check-label small" for="price3">Above Rs. 500,000 (Premium)</label>
                </div>
              </div>
              <button type="submit" class="btn btn-custom w-100 btn-sm">Apply filters</button>
            </form>
          </div>
        </div>
      </div>

      <!-- Vendor Grid -->
      <div class="col-md-9">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <p class="mb-0 text-muted" id="resultsCount">Showing 0 results</p>
          <select class="form-select w-auto form-select-sm" id="sortSelect">
            <option>Sort by: Recommended</option>
            <option>Rating (high to low)</option>
            <option>Price (low to high)</option>
          </select>
        </div>

        <div class="row g-4" id="vendorGrid">
          <!-- Loading Spinner -->
          <div class="col-12 text-center py-5" id="loadingSpinner">
            <div class="spinner-border text-primary" role="status">
              <span class="visually-hidden">Loading...</span>
            </div>
            <p class="text-muted mt-2">Loading vendors...</p>
          </div>
        </div>

        <!-- Pagination -->
        <nav aria-label="Page navigation" class="mt-5">
          <ul class="pagination justify-content-center">
            <li class="page-item disabled"><a class="page-link" href="#" tabindex="-1">Previous</a></li>
            <li class="page-item active"><a class="page-link" href="#">1</a></li>
            <li class="page-item"><a class="page-link" href="#">2</a></li>
            <li class="page-item"><a class="page-link" href="#">3</a></li>
            <li class="page-item"><a class="page-link" href="#">Next</a></li>
          </ul>
        </nav>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/vendor-filters.js"></script>
  <script src="../js/script.js"></script>
  <script src="../js/wishlist-utils.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const vendorGrid = document.getElementById('vendorGrid');
      const resultsCount = document.getElementById('resultsCount');
      const categoryFilter = document.getElementById('categoryFilter');
      const locationFilter = document.getElementById('locationFilter');
      const filterForm = document.getElementById('vendorFilterForm');
      const userStr = sessionStorage.getItem('dreamWeddingUser');
      const user = userStr ? JSON.parse(userStr) : null;

      populateCategorySelect(categoryFilter);
      populateDistrictSelect(locationFilter);

      let allVendors = [];
      let activeFilters = getVendorFilterParams();

      categoryFilter.value = activeFilters.category;
      locationFilter.value = activeFilters.location;

      filterForm.addEventListener('submit', (e) => {
        e.preventDefault();
        activeFilters = {
          category: categoryFilter.value,
          location: locationFilter.value
        };
        const query = buildVendorFilterQuery(activeFilters);
        window.history.replaceState(null, '', query || window.location.pathname);
        renderVendors(applyFilters(allVendors, activeFilters));
      });

      try {
        const response = await fetch('/api/vendors');
        if (!response.ok) throw new Error('Failed to fetch vendors');
        allVendors = await response.json();
        renderVendors(applyFilters(allVendors, activeFilters));
      } catch (e) {
        console.error(e);
        vendorGrid.innerHTML = `<div class="alert alert-danger">Failed to load vendors: ${e.message}</div>`;
      }

      function applyFilters(vendors, filters) {
        return vendors.filter(v => matchesVendorFilters(v, filters));
      }

      function renderVendors(vendors) {
        resultsCount.textContent = `Showing ${vendors.length} results`;

        const spinner = document.getElementById('loadingSpinner');
        if (spinner) spinner.remove();

        if (vendors.length === 0) {
          vendorGrid.innerHTML = '<div class="col-12 text-center py-5"><h5 class="text-muted">No vendors found matching your criteria.</h5><a href="vendor-list.html" class="btn btn-link">Clear all filters</a></div>';
          return;
        }

        vendorGrid.innerHTML = vendors.map(vendor => {
          const vName = vendor.businessName || 'Unnamed Vendor';
          const vCat = vendor.category || 'Vendor';
          const vLoc = vendor.location || 'Location Pending';
          const vRating = vendor.averageRating || '0.0';
          const vReviews = vendor.reviewCount || 0;
          
          let mainImage = 'https://images.unsplash.com/photo-1520854221256-17451cc331bf?auto=format&fit=crop&w=600&q=80';
          if (vendor.galleryPhotos && vendor.galleryPhotos.length > 0) {
            mainImage = vendor.galleryPhotos[0];
          }

          const priceHtml = (vendor.packages && vendor.packages.length > 0)
            ? `<div class="fw-bold text-primary">From ${vendor.packages[0].priceRange}</div>`
            : '<div class="text-muted small">Price on request</div>';

          const sanitizedName = vName.replace(/'/g, "\\'");

          return `
            <div class="col-lg-4 col-sm-6">
              <div class="card vendor-card h-100 shadow-sm border-0 premium-card p-0 overflow-hidden position-relative">
                <button class="wishlist-btn" data-vendor-id="${vendor.id}" onclick="event.preventDefault(); toggleWishlist('${vendor.id}', '${sanitizedName}', '${vCat}', '${vLoc}', '${mainImage}', this)">
                  <i class="fa-regular fa-heart"></i>
                </button>
                <img src="${mainImage}" class="card-img-top" alt="${vName}" style="height:200px; object-fit:cover;">
                <div class="card-body p-4">
                  <div class="d-flex justify-content-between align-items-start mb-2">
                     <span class="badge bg-light text-primary border rounded-pill px-3 py-1" style="font-size: 0.7rem; text-transform: none; letter-spacing: 1px; font-weight: 700;">${vCat}</span>
                  </div>
                  <h5 class="card-title fw-bold text-truncate" title="${vName}" style="font-family: 'Playfair Display', serif;">${vName}</h5>
                  <p class="text-muted small mb-2 text-truncate"><i class="fa-solid fa-location-dot me-1"></i> ${vLoc}</p>
                  <div class="mb-3">${priceHtml}</div>
                  <div class="d-flex justify-content-between align-items-center mb-0 mt-2">
                    <div>
                      <i class="fa-solid fa-star text-warning me-1"></i> 
                      <span class="fw-bold">${vRating}</span>
                      <span class="text-muted small">(${vReviews})</span>
                    </div>
                    <a href="vendor-details.html?id=${vendor.id}" class="btn btn-sm btn-outline-gold rounded-pill px-3 fw-bold">Details</a>
                  </div>
                </div>
              </div>
            </div>
          `;
        }).join('');

        // Check wishlist status for all rendered vendors
        if (user && user.role === 'CUSTOMER' && window.Wishlist) {
            const vendorIds = vendors.map(v => v.id);
            window.Wishlist.checkStatus(vendorIds, user.id);
        }
      }
    });

    /**
     * toggleWishlist - Wrapper for the Wishlist utility
     */
    async function toggleWishlist(id, name, cat, loc, img, btn) {
        if (!window.Wishlist) return;
        await window.Wishlist.toggle({
            vendorId: id,
            vendorName: name,
            vendorCategory: cat,
            vendorLocation: loc,
            vendorImage: img
        }, btn);
    }
  </script>
</body>
</html>
